<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>示例文章：Hugo 页面结构规划 | Hugo Blog Starter</title>
  <meta name="description" content="用于占位展示列表页、详情页和标签页之间的导航关系。" />
  <link rel="stylesheet" href="/site.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/">Hugo Blog Starter</a>
      <nav aria-label="主导航">
        <a href="/">首页</a>
        <a href="/posts/">文章</a>
        <a href="/tags/">标签</a>
      </nav>
    </div>
  </header>

  <article class="wrap article">
    <header class="article-head">
      <p class="eyebrow">Post</p>
      <h1>示例文章：Hugo 页面结构规划</h1>
      <div class="meta">2026-05-06 / 静态站点、占位数据</div>
      <p class="lede">用于占位展示列表页、详情页和标签页之间的导航关系。</p>
    </header>
    <div class="article-body">
      <p>Hugo 站点通常由内容、模板、数据和配置组成。</p>
      <p>当前仓库使用自定义布局，不依赖外部主题。内容文件存放文章，模板控制页面结构，数据文件提供首页展示数据。</p>
      <h2>占位说明</h2>
      <p>这些示例文章只是展示页面关系。后续添加真实文章时，可以复制已有内容格式，替换标题、日期、标签和正文。</p>
    </div>
  </article>

  <footer class="site-footer">
    <div class="wrap">Built with Hugo and GitHub Pages</div>
  </footer>
</body>
</html>
