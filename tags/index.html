<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>标签 | Hugo Blog Starter</title>

  <link rel="stylesheet" href="/site.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/">Hugo Blog Starter</a>
      <nav aria-label="主导航">
        <a href="/">首页</a>
        <a href="/posts/">文章</a>
        <a href="/tags/">标签</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="wrap page-head">
      <p class="eyebrow">Tags</p>
      <h1>标签</h1>
      <p class="lede">按占位标签浏览示例文章。</p>

    <section class="wrap section">
      <div class="tag-cloud" aria-label="标签列表">

        <span>占位数据 2</span>
        <span>可观测性 1</span>

    <div class="wrap">Built with Hugo and GitHub Pages</div>
