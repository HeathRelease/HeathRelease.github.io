<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heath's Blog</title>
  <meta name="description" content="Heath's Blog" />
  <link rel="stylesheet" href="/site.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/">Heath's Blog</a>
      <nav aria-label="主导航">
        <a href="/">首页</a>
        <a href="/posts/">文章</a>
        <a href="/tags/">标签</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="wrap hero-grid">
        <div>
          <p class="eyebrow">Heath's Blog</p>
          <h1>Heath's Blog</h1>
          <p class="lede">记录技术实践、项目构建与日常思考。</p>
        </div>
        <aside class="panel">
          <h2>关于这里</h2>
          <p>这是 Heath 的个人博客，后续文章会按时间归档，并通过标签组织。</p>
        </aside>
      </div>
    </section>

    <section class="wrap section" aria-labelledby="posts-title">
      <div class="section-head">
        <div>
          <p class="eyebrow">Latest Posts</p>
          <h2 id="posts-title">最近文章</h2>
        </div>
        <a href="/posts/">查看全部</a>
      </div>
      <div class="card-grid">
        <p class="empty">暂无文章。</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span>Heath's Blog</span>
      <span>Powered by Hugo</span>
    </div>
  </footer>
</body>
</html>
