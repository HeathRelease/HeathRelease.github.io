<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --bg: #141615;
    --surface: #1a1e1b;
    --surface-soft: #20261f;
    --text: #ded7c8;
    --muted: #aaa191;
    --faint: #777062;
    --line: #30362f;
    --heading: #f7f0e4;
    --accent: #d4aa62;
    --accent-soft: #8fb6a4;
    --accent-warm: #c47f5b;
    --measure: 38rem;
  }

  html {
    font-size: 20px;
    scroll-behavior: smooth;
  }

  @keyframes page-rise {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes soft-reveal {
    from {
      opacity: 0;
      filter: blur(4px);
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }
  }

  body {
    margin: 0;
    background:
      linear-gradient(180deg, #191c19 0%, #111312 28rem, var(--bg) 100%);
    color: var(--text);
    font-family: Georgia, "Times New Roman", "Songti SC", "SimSun", serif;
    line-height: 1.65;
    animation: page-rise 460ms ease-out both;
  }

  ::selection {
    background: rgba(212, 170, 98, 0.28);
    color: var(--heading);
  }

  a {
    color: var(--accent);
    text-decoration: none;
    text-decoration-color: rgba(212, 170, 98, 0);
    text-underline-offset: 0.18em;
    transition:
      color 160ms ease,
      text-decoration-color 160ms ease;
  }

  a:hover,
  a:focus {
    color: #e7c889;
    text-decoration: underline;
    text-decoration-color: rgba(231, 200, 137, 0.72);
  }

  .wrap {
    max-width: var(--measure);
    margin: 0 auto;
    padding-right: 1rem;
    padding-left: 1rem;
  }

  .site-header {
    border-bottom: 1px solid var(--line);
    background: rgba(20, 22, 21, 0.92);
    backdrop-filter: blur(12px);
    transition: border-color 180ms ease, background 180ms ease;
  }

  .nav {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1.5rem;
    padding-top: 1.3rem;
    padding-bottom: 1.3rem;
  }

  .brand {
    display: inline-block;
    color: var(--heading);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: 0;
    transition: color 160ms ease;
  }

  .brand:hover,
  .brand:focus {
    color: var(--accent);
    text-decoration: none;
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.85rem;
    justify-content: flex-end;
    color: var(--muted);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    font-size: 0.78rem;
  }

  nav a {
    color: var(--muted);
    transition: color 160ms ease;
  }

  nav a:hover,
  nav a:focus {
    color: var(--accent);
  }

  .hero,
  .page-head,
  .article {
    padding-top: 3rem;
    padding-bottom: 2rem;
  }

  .brand,
  nav,
  .hero .eyebrow,
  .hero h1,
  .hero .lede,
  .panel,
  .metrics,
  .section-head,
  .card,
  .topic-card,
  .post-row,
  .tag-cloud,
  .article-head,
  .article-body,
  footer,
  .site-footer {
    animation: soft-reveal 620ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .brand { animation-delay: 40ms; }
  nav { animation-delay: 140ms; }
  .hero .eyebrow,
  .page-head .eyebrow,
  .article-head .eyebrow { animation-delay: 230ms; }
  .hero h1,
  .page-head h1,
  .article-head h1 { animation-delay: 280ms; }
  .hero .lede,
  .page-head .lede,
  .article-head .lede { animation-delay: 330ms; }
  .panel { animation-delay: 380ms; }
  .metrics { animation-delay: 430ms; }
  .section-head { animation-delay: 480ms; }
  .card:nth-child(1),
  .post-row:nth-child(1),
  .topic-card:nth-child(1) { animation-delay: 540ms; }
  .card:nth-child(2),
  .post-row:nth-child(2),
  .topic-card:nth-child(2) { animation-delay: 600ms; }
  .card:nth-child(3),
  .post-row:nth-child(3),
  .topic-card:nth-child(3) { animation-delay: 660ms; }
  .tag-cloud,
  .article-body { animation-delay: 380ms; }
  footer,
  .site-footer { animation-delay: 720ms; }

  .hero-grid {
    display: block;
  }

  .eyebrow,
  .meta,
  .topic-count {
    color: var(--faint);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .eyebrow {
    margin: 0 0 0.4rem;
    color: var(--accent-soft);
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  h1,
  h2,
  h3 {
    color: var(--heading);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    line-height: 1.2;
  }

  h1 {
    letter-spacing: 0;
  }

  h1 {
    margin-bottom: 0.7rem;
    font-size: 2.15rem;
  }

  h2 {
    margin-bottom: 0.75rem;
    font-size: 1.45rem;
  }

  h3 {
    margin-bottom: 0.35rem;
    font-size: 1.15rem;
  }

  .lede {
    margin-bottom: 0;
    color: var(--muted);
    font-size: 1rem;
  }

  .panel {
    margin-top: 1.8rem;
    padding: 0.1rem 0 0.1rem 1rem;
    border-left: 2px solid rgba(143, 182, 164, 0.68);
    transform: translateX(0);
    transition:
      border-color 180ms ease,
      transform 180ms ease;
  }

  .panel:hover {
    border-left-color: rgba(212, 170, 98, 0.72);
    transform: translateX(3px);
  }

  .panel p {
    margin-bottom: 0;
    color: var(--muted);
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1rem;
    padding-top: 0.8rem;
    padding-bottom: 1.5rem;
  }

  .metric {
    padding-top: 0.7rem;
    border-top: 1px solid var(--line);
    transition:
      border-color 180ms ease,
      transform 180ms ease;
  }

  .metric:hover {
    border-color: rgba(212, 170, 98, 0.45);
    transform: translateY(-2px);
  }

  .metric strong {
    display: block;
    color: var(--accent);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    font-size: 1.55rem;
    line-height: 1;
  }

  .metric span {
    color: var(--muted);
    font-size: 0.82rem;
  }

  .section {
    padding-top: 1.5rem;
    padding-bottom: 2.5rem;
  }

  .section-head {
    margin-bottom: 0.8rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid rgba(212, 170, 98, 0.26);
  }

  .section-head h2 {
    margin-bottom: 0.2rem;
  }

  .section-head > a {
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    font-size: 0.8rem;
  }

  .grid,
  .card-grid,
  .topic-grid,
  .post-list {
    display: grid;
    gap: 0;
  }

  .card,
  .topic-card,
  .post-row {
    padding: 1rem 0;
    border-bottom: 1px solid rgba(48, 54, 47, 0.9);
    transition:
      border-color 180ms ease,
      transform 180ms ease;
  }

  .card:hover,
  .topic-card:hover,
  .post-row:hover {
    border-bottom-color: rgba(212, 170, 98, 0.36);
    transform: translateX(4px);
  }

  .card:first-child,
  .topic-card:first-child,
  .post-row:first-child {
    padding-top: 0.4rem;
  }

  .card p,
  .topic-card p,
  .post-row p {
    margin-bottom: 0;
    color: var(--muted);
  }

  .card h3 a,
  .post-row h2 a {
    color: var(--heading);
  }

  .card h3 a:hover,
  .post-row h2 a:hover {
    color: var(--accent);
  }

  .meta,
  .topic-count {
    margin-bottom: 0.3rem;
  }

  .article-head {
    margin-bottom: 1.5rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid rgba(212, 170, 98, 0.26);
  }

  .article-body {
    color: var(--text);
  }

  .article-body h2 {
    margin-top: 2rem;
    color: var(--accent-soft);
  }

  .article-body p,
  .article-body li {
    color: var(--text);
  }

  .article-body li + li {
    margin-top: 0.3rem;
  }

  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
  }

  .tag-cloud a,
  .tag-cloud span {
    display: inline-flex;
    align-items: center;
    min-height: 1.9rem;
    padding: 0 0.7rem;
    border: 1px solid rgba(143, 182, 164, 0.28);
    border-radius: 999px;
    background: var(--surface-soft);
    color: var(--accent-soft);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    font-size: 0.78rem;
    transition:
      border-color 180ms ease,
      color 180ms ease,
      transform 180ms ease;
  }

  .tag-cloud a:hover {
    border-color: rgba(212, 170, 98, 0.52);
    color: var(--accent);
    text-decoration: none;
    transform: translateY(-1px);
  }

  .tag-cloud a span {
    min-height: auto;
    margin-left: 0.35rem;
    padding: 0;
    border: 0;
    background: transparent;
    color: var(--muted);
  }

  .empty {
    color: var(--muted);
  }

  .site-footer,
  footer {
    margin-top: 1.5rem;
    padding: 1.4rem 0 2rem;
    border-top: 1px solid var(--line);
    color: var(--faint);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    font-size: 0.72rem;
  }

  .footer-inner {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: space-between;
  }

  @media (max-width: 640px) {
    html {
      font-size: 18px;
    }

    .nav {
      align-items: flex-start;
      flex-direction: column;
      gap: 0.55rem;
    }

    nav {
      justify-content: flex-start;
    }

    h1 {
      font-size: 1.85rem;
    }

    .metrics {
      grid-template-columns: 1fr;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 1ms !important;
      scroll-behavior: auto !important;
      transition-duration: 1ms !important;
    }
  }
</style>
