{{ define "main" }}
<section class="wrap page-head">
  <p class="eyebrow">Tags</p>
  <h1>{{ .Title }}</h1>
  <p class="lede">按占位标签浏览示例文章。</p>
</section>

<section class="wrap section">
  <div class="tag-cloud">
    {{ range .Data.Terms.Alphabetical }}
      <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} <span>{{ .Count }}</span></a>
    {{ end }}
  </div>
</section>
{{ end }}
