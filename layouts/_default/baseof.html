<!DOCTYPE html>
<html lang="{{ site.Language.Locale | default "zh-CN" }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}" />
  {{ partial "styles.html" . }}
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="{{ "/" | relURL }}">{{ site.Title }}</a>
      <nav aria-label="主导航">
        <a href="{{ "/" | relURL }}">首页</a>
        <a href="{{ "/posts/" | relURL }}">文章</a>
        <a href="{{ "/tags/" | relURL }}">标签</a>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span>Built with Hugo and GitHub Pages</span>
      <span>Placeholder content for preview</span>
    </div>
  </footer>
</body>
</html>
